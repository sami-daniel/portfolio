<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agradecimento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            text-align: center;
        }

        .header {
            background-color: #007BFF;
            color: #fff;
            padding: 10px;
            border-radius: 5px 5px 0 0;
        }

        .content {
            padding: 20px;
        }

        .svg-container {
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Obrigado pelo seu email!</h1>
        </div>
        <div class="content">
            <p>Quero expressar minha sincera gratidão pelo seu email. Agradecemos por entrar em contato conosco.</p>
            <div class="svg-container">
                <svg viewBox="0 0 24 24" width="100" height="100" stroke="#F6BE2C" stroke-width="3" fill="#F6BE2C"
                    stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                    </path>
                </svg>
            </div>
            <p>Seu feedback é valioso para mim, e agradeço a mensagem.</p>
            <p>Atenciosamente,</p>
            <p>Sami Daniel</p>
        </div>
    </div>
</body>

</html>
